<!DOCTYPE html>
<html>
  <head>
    <title>Login Form</title>
    <style type="text/css">
      /* Center the login and registration forms */
.main {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Style the form input fields */
.input {
  display: block;
  margin-bottom: 10px;
  padding: 10px;
  width: 250px;
  font-size: 16px;
  border: none;
  border-radius: 5px;
  background-color: #f2f2f2;
}

/* Style the form buttons */
button {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 150px;
  font-size: 16px;
  border: none;
  border-radius: 5px;
  background-color: #4CAF50;
  color: white;
  cursor: pointer;
}

/* Style the login and registration forms */
.login {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
  margin: 20px;
  border: 1px solid #ccc;
  border-radius: 5px;
  background-color: #fff;
  cursor: pointer;
}

/* Style the form labels */
label {
  display: none;
}

/* Style the form headings */
.login h2 {
  margin: 0 0 20px;
  font-size: 24px;
  text-align: center;
}

/* Hover effect on forms */
.login:hover,  {
  box-shadow: 0 0 10px #ccc;
}


}


    </style>
  </head>
  <body>
    <div class="main">
      <div class="login-form login">
        <h2>Login</h2>
        <form class="form">
          <label for="chk" aria-hidden="true">Log in</label>
          <input class="input" type="email" name="email" placeholder="Email" required="">
          <input class="input" type="password" name="pswd" placeholder="Password" required="">
          <button>Log in</button>
      
        <h3>dont have a account? Register now  <button onclick="return false;">Register</button> </h3>
      
      </form>
       </div>
      </div>

    </body>
</html>
