<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome Checker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Palindrome Checker</h1>
        <p>A palindrome checker is a tool that determines whether a given word, phrase, number, or other sequence of characters reads the same backward as forward (ignoring spaces, punctuation, and capitalization). Enter a text below to see if it's a palindrome.</p>
        <input type="text" id="text-input" placeholder="Enter text">
        <button id="check-btn">Check</button>
        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
